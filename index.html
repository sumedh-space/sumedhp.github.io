<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#101114">
<title>Sumedh Patil — Product Security Engineer</title>
<meta name="description" content="Sumedh Patil — Product Security Engineer at Conga. Cloud security, DevSecOps, threat intelligence.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<style>
/* ================= BALEON-STYLE THEME ================= */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#101114;--bg2:#15171b;--card:#1a1d22;--card2:#1f2329;
  --line:#262a31;--line2:#33384180;
  --white:#fff;--text:#c7ccd4;--muted:#8a909b;--dim:#5a606c;
  --accent:#c9f158;          /* baleon-style lime */
  --accent-ink:#11130a;
  --serif:'Playfair Display',serif;--sans:'Epilogue',sans-serif;
  --r:18px;
}
html{scroll-behavior:smooth}
section[id]{scroll-margin-top:70px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:16px;line-height:1.7}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
::selection{background:var(--accent);color:var(--accent-ink)}
::-webkit-scrollbar{width:9px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#2c313a;border-radius:9px}

em.it{font-family:var(--serif);font-style:italic;font-weight:600;color:var(--accent)}
.type-caret{display:inline-block;width:3px;height:.9em;background:var(--accent);margin-left:4px;vertical-align:-2px;animation:caretBlink 1s step-end infinite}
@keyframes caretBlink{50%{opacity:0}}

/* ============ LAYOUT: fixed sidebar + scrolling content ============ */
.shell{display:grid;grid-template-columns:430px 1fr;min-height:100vh}

/* ---------- SIDEBAR ---------- */
.sidebar{position:sticky;top:0;height:100vh;padding:48px 44px;display:flex;flex-direction:column;border-right:1px solid var(--line);background:var(--bg2);overflow-y:auto}
.side-logo{font-weight:800;font-size:20px;color:var(--white);letter-spacing:-.01em;margin-bottom:auto}
.side-logo span{color:var(--accent)}
.avatar-wrap{display:flex;align-items:center;gap:16px;margin:34px 0 26px}
.avatar{width:74px;height:74px;border-radius:50%;overflow:hidden;border:2px solid var(--line);flex-shrink:0;position:relative}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar::after{content:'';position:absolute;right:1px;bottom:3px;width:14px;height:14px;border-radius:50%;background:var(--accent);border:3px solid var(--bg2)}
.hey{font-size:15px;color:var(--muted)}
.hey b{display:block;color:var(--white);font-size:17px;font-weight:700}
.role-chip{display:inline-block;font-size:12.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:rgba(201,241,88,.1);border:1px solid rgba(201,241,88,.25);padding:6px 14px;border-radius:99px;margin-top:6px}
.side-title{font-family:var(--sans);font-size:clamp(30px,2.6vw,40px);font-weight:800;line-height:1.18;color:var(--white);letter-spacing:-.02em;margin-bottom:20px}
.side-text{font-size:15px;color:var(--muted);margin-bottom:30px}
.side-cta{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:var(--accent-ink);font-weight:700;font-size:15px;padding:14px 30px;border-radius:99px;transition:all .25s;width:fit-content}
.side-cta:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(201,241,88,.25)}
.side-cta.ghost{background:transparent;color:var(--text);border:1px solid var(--line2)}
.side-cta.ghost:hover{border-color:var(--accent);color:var(--accent);box-shadow:none}
.cta-row{display:flex;gap:12px;flex-wrap:wrap}
.side-cta .arrow{transition:transform .25s}
.side-cta:hover .arrow{transform:translateX(4px)}
.side-foot{margin-top:auto;padding-top:36px}
.side-socials{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.soc{width:42px;height:42px;border-radius:50%;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);transition:all .25s}
.soc:hover{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);transform:translateY(-3px)}
.copy{font-size:12.5px;color:var(--dim)}

/* ---------- CONTENT ---------- */
.content{min-width:0}
.topnav{position:sticky;top:0;z-index:50;display:flex;justify-content:flex-end;align-items:center;gap:30px;padding:22px 48px;background:rgba(16,17,20,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topnav a{font-size:14.5px;font-weight:600;color:var(--muted);transition:color .25s}
.topnav a:hover,.topnav a.active{color:var(--accent)}
.say-hello{background:var(--accent);color:var(--accent-ink)!important;padding:10px 24px;border-radius:99px;font-weight:700;transition:all .25s}
.say-hello:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(201,241,88,.25)}

.block{padding:88px 48px;border-bottom:1px solid var(--line)}
.block:last-of-type{border-bottom:none}

/* stats strip */
.stats-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-bottom:1px solid var(--line)}
.stat{padding:34px 20px;text-align:center;border-right:1px solid var(--line);transition:background .3s}
.stat:last-child{border-right:none}
.stat:hover{background:var(--card)}
.stat-num{font-size:34px;font-weight:800;color:var(--white);line-height:1.1}
.stat-num em{font-family:var(--serif);font-style:italic;color:var(--accent);font-weight:600}
.stat-label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-top:6px}
h2{font-size:clamp(28px,3vw,40px);font-weight:800;color:var(--white);letter-spacing:-.02em;line-height:1.2;margin-bottom:14px}
.block-sub{font-size:15.5px;color:var(--muted);max-width:560px;margin-bottom:46px}

.reveal{opacity:0;transform:translateY(32px);transition:opacity .8s cubic-bezier(.2,.65,.3,1),transform .8s cubic-bezier(.2,.65,.3,1)}
.reveal.in{opacity:1;transform:none}

/* ---------- showcase cards (with photos) ---------- */
.show-grid{display:grid;grid-template-columns:1fr 1fr;gap:26px}
.show-card{border-radius:var(--r);overflow:hidden;background:var(--card);border:1px solid var(--line);transition:all .35s}
.show-card:hover{transform:translateY(-7px);box-shadow:0 26px 60px rgba(0,0,0,.5);border-color:var(--line2)}
.show-img{aspect-ratio:16/10;overflow:hidden;position:relative}
.show-img img,.show-img svg{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.2,.65,.3,1);filter:saturate(.85);display:block}
.show-card:hover .show-img img,.show-card:hover .show-img svg{transform:scale(1.07)}
.show-img .badge{position:absolute;top:16px;left:16px;background:rgba(16,17,20,.8);backdrop-filter:blur(6px);color:var(--accent);font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-radius:99px;border:1px solid rgba(201,241,88,.25)}
.show-body{padding:24px 26px 28px}
.show-title{font-size:19px;font-weight:700;color:var(--white);margin-bottom:8px;transition:color .25s}
.show-card:hover .show-title{color:var(--accent)}
.show-desc{font-size:14px;color:var(--muted)}

/* ---------- experience ---------- */
.exp-item{display:grid;grid-template-columns:190px 1fr;gap:28px;padding:32px 0;border-bottom:1px solid var(--line)}
.exp-item:last-child{border-bottom:none}
.exp-date{font-size:13.5px;font-weight:600;color:var(--dim);padding-top:5px}
.exp-date .now{display:inline-block;color:var(--accent);background:rgba(201,241,88,.1);padding:3px 12px;border-radius:99px;font-size:11.5px;margin-top:8px;border:1px solid rgba(201,241,88,.25)}
.exp-role{font-size:20px;font-weight:700;color:var(--white);transition:color .3s}
.exp-item:hover .exp-role{color:var(--accent)}
.exp-co{font-size:14.5px;color:var(--muted);font-weight:600;margin:2px 0 10px}
.exp-co b{color:var(--text)}
.exp-desc{font-size:14.5px;color:var(--muted);max-width:620px}
.exp-desc li{margin-left:18px;margin-bottom:3px}

/* ---------- credentials ---------- */
.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.cred{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:26px 28px;transition:all .3s}
.cred:hover{border-color:rgba(201,241,88,.35);transform:translateY(-5px)}
.cred-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.cred-ic{width:46px;height:46px;border-radius:13px;background:rgba(201,241,88,.08);border:1px solid rgba(201,241,88,.2);display:flex;align-items:center;justify-content:center;font-size:20px}
.cred-kind{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.cred-name{font-size:16px;font-weight:700;color:var(--white);line-height:1.4;margin-bottom:4px}
.cred-by{font-size:13.5px;color:var(--muted)}

/* ---------- FAQ ---------- */
.faq{border-bottom:1px solid var(--line)}
.faq summary{display:flex;justify-content:space-between;align-items:center;gap:20px;padding:24px 4px;cursor:pointer;list-style:none;font-size:17px;font-weight:700;color:var(--white);transition:color .25s}
.faq summary::-webkit-details-marker{display:none}
.faq summary:hover{color:var(--accent)}
.faq summary .plus{width:34px;height:34px;border-radius:50%;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:400;color:var(--muted);flex-shrink:0;transition:all .3s}
.faq[open] summary .plus{transform:rotate(45deg);background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.faq-body{padding:0 4px 24px;font-size:14.5px;color:var(--muted);max-width:640px}

/* ---------- gallery ---------- */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.g-item{border-radius:var(--r);overflow:hidden;aspect-ratio:4/5;position:relative}
.g-item img,.g-item svg{width:100%;height:100%;object-fit:cover;transition:transform .7s cubic-bezier(.2,.65,.3,1);filter:saturate(.8);display:block}
.g-item:hover img,.g-item:hover svg{transform:scale(1.08)}
.g-item .g-cap{position:absolute;left:14px;bottom:14px;background:rgba(16,17,20,.75);backdrop-filter:blur(6px);color:var(--white);font-size:12.5px;font-weight:600;padding:7px 16px;border-radius:99px;border:1px solid var(--line2)}
.g-item:nth-child(2){transform:translateY(26px)}

/* ---------- contact ---------- */
.contact-card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:46px;max-width:720px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.fg{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.fg label{font-size:13px;font-weight:600;color:var(--muted)}
.fg input,.fg textarea,.fg select{background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:14px 18px;font-size:15px;color:var(--white);font-family:var(--sans);outline:none;width:100%;transition:all .25s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(201,241,88,.1)}
.fg textarea{resize:vertical;min-height:130px}
.fg select option{background:var(--bg)}
.submit-btn{width:100%;padding:17px;background:var(--accent);color:var(--accent-ink);border:none;border-radius:99px;font-family:var(--sans);font-size:16px;font-weight:800;cursor:pointer;transition:all .25s}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(201,241,88,.28)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.form-notice{font-size:12px;color:var(--dim);text-align:center;margin-top:14px}
.form-notice a{color:var(--accent)}
.msg-box{display:none;padding:14px 18px;border-radius:13px;font-size:14px;font-weight:600;margin-bottom:18px;text-align:center}
.msg-success{background:rgba(201,241,88,.1);border:1px solid rgba(201,241,88,.3);color:var(--accent)}
.msg-error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:#f87171}
.contact-meta{display:flex;gap:36px;flex-wrap:wrap;margin-bottom:40px}
.cm .cm-label{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.cm .cm-value{font-size:15px;font-weight:600;color:var(--white)}
.cm .cm-value a:hover{color:var(--accent)}

#toTop{position:fixed;bottom:26px;right:26px;width:48px;height:48px;border-radius:50%;background:var(--accent);color:var(--accent-ink);border:none;font-size:18px;cursor:pointer;opacity:0;pointer-events:none;transition:all .3s;z-index:90}
#toTop.show{opacity:1;pointer-events:auto}
#toTop:hover{transform:translateY(-4px)}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  .reveal{opacity:1;transform:none}
  html{scroll-behavior:auto}
}
@media(max-width:1100px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--line);padding:108px 32px 48px}
  .topnav{position:fixed;left:0;right:0;justify-content:center}
  .show-grid,.cred-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:700px){
  body{font-size:15px}
  .block{padding:56px 18px}
  .sidebar{padding:96px 18px 40px}
  .side-title{font-size:27px}
  .side-text{font-size:14.5px;margin-bottom:24px}
  .side-cta{width:100%;justify-content:center;padding:16px}
  .avatar{width:62px;height:62px}
  .hey{font-size:14px}
  .hey b{font-size:16px}
  h2{font-size:25px}
  .block-sub{font-size:14.5px;margin-bottom:32px}

  /* top nav: horizontally scrollable pill bar with hidden scrollbar */
  .topnav{justify-content:flex-start;gap:6px;padding:12px 14px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .topnav::-webkit-scrollbar{display:none}
  .topnav a{flex-shrink:0;padding:9px 14px;border-radius:99px;background:var(--card);border:1px solid var(--line);font-size:13.5px}
  .topnav a.active{color:var(--accent);border-color:rgba(201,241,88,.4)}
  .say-hello{border:none!important}

  .show-grid,.cred-grid,.form-row{grid-template-columns:1fr}
  .stats-strip{grid-template-columns:repeat(2,1fr)}
  .stat{padding:22px 12px;border-bottom:1px solid var(--line)}
  .stat:nth-child(2n){border-right:none}
  .stat:last-child{grid-column:1/-1;border-bottom:none}
  .stat-num{font-size:27px}
  .cta-row{width:100%}
  .cta-row .side-cta{flex:1 1 100%;justify-content:center}
  .show-body{padding:20px 20px 24px}
  .show-title{font-size:17.5px}

  .exp-item{grid-template-columns:1fr;gap:6px;padding:26px 0}
  .exp-date{display:flex;align-items:center;gap:10px;padding-top:0}
  .exp-date br{display:none}
  .exp-date .now{margin-top:0}
  .exp-role{font-size:18px}

  .cred{padding:22px}
  .faq summary{font-size:15.5px;padding:20px 2px}
  .faq-body{font-size:14px}

  /* gallery: portrait of user full width, illustrations side by side */
  .gallery{grid-template-columns:1fr 1fr;gap:14px}
  .g-item:nth-child(2){transform:none;grid-column:1/-1;aspect-ratio:4/4.2;order:-1}
  .g-item{aspect-ratio:3/4}

  .contact-meta{gap:18px}
  .cm{flex:1 1 100%}
  .contact-card{padding:22px;border-radius:18px}
  /* 16px inputs prevent iOS auto-zoom on focus */
  .fg input,.fg textarea,.fg select{font-size:16px;padding:14px 16px}
  .submit-btn{padding:16px}
  #toTop{bottom:18px;right:18px;width:44px;height:44px}
}
@media(max-width:380px){
  .block{padding:48px 14px}
  .sidebar{padding:92px 14px 36px}
  .side-title{font-size:24px}
}
</style>
</head>
